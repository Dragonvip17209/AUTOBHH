	<main class="bang">
  <div class="phanchinh">
    <h2>Quên mật khẩu</h2>
    <p>Nhập email hoặc số điện thoại đã đăng ký để đặt lại mật khẩu</p>
    <form id="step1">
      <div class="bangnhap">
        <label>Email hoặc Số điện thoại</label>
        <input id="identify" type="text" placeholder="abc@gmail.com hoặc 09xxxxxxx" required />
      </div>
      <button class="nutbam" type="submit">Đổi Mật Khẩu</button>
    </form>
    <form id="step2" style="display:none;">
      <div class="bangnhap">
        <label>Mật khẩu mới</label>
        <input id="newPass" type="password" placeholder="Tối thiểu 6 ký tự" />
      </div>
      <div class="bangnhap">
        <label>Nhập lại mật khẩu</label>
        <input id="confirmPass" type="password" placeholder="Nhập lại mật khẩu" />
      </div>
		<button class="nutbam" type="submit">Đổi mật khẩu</button>
    </form>
    <div id="errorBox" class="error"></div>
    <div id="successBox" class="success"></div>
  </div>
</main>
