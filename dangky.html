    <p>Tạo tài khoản để mua sắm và theo dõi đơn hàng</p>

    <form id="registerForm">
      <div class="dong">
        <div class="bangnhap">

          <input id="phone" type="tel" placeholder="Ví dụ: 09xxxxxxxx" required />
        </div>
      </div>

      <div class="Email">
        <label>Email</label>
        <input id="email" type="email" placeholder="Ví dụ: abc@gmail.com" required />
      </div>

        <div class="bangnhap">
          <label>Mật khẩu</label>
          <input id="password" type="password" placeholder="Tối thiểu 6 ký tự" required />
        </div>
        <div class="bangnhap">
          <label>Nhập lại mật khẩu</label>
          <input id="confirm" type="password" placeholder="Nhập lại mật khẩu" required />
        </div>
      </div>

      <button class="nutbam" type="submit">Tạo tài khoản</button>

      <div id="successBox" class="success"></div>
